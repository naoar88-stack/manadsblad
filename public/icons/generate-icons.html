<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Generera PWA-ikoner</title>
  <style>
    body { font-family: sans-serif; padding: 2rem; background: #f8f8f8; }
    canvas { display: block; margin: 1rem 0; border: 1px solid #ddd; }
    button { padding: 0.5rem 1.5rem; background: #4f46e5; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; margin: 0.5rem; }
    .row { display: flex; gap: 2rem; flex-wrap: wrap; align-items: flex-start; }
    .col { display: flex; flex-direction: column; align-items: center; }
  </style>
</head>
<body>
  <h2>Månadsblad — PWA-ikoner</h2>
  <p>Klicka på knapparna för att ladda ned ikonerna. Lägg dem i <code>public/icons/</code>.</p>
  <div class="row">
    <div class="col">
      <canvas id="c192" width="192" height="192"></canvas>
      <button onclick="download('c192','icon-192.png')">Ladda ned icon-192.png</button>
    </div>
    <div class="col">
      <canvas id="c512" width="512" height="512"></canvas>
      <button onclick="download('c512','icon-512.png')">Ladda ned icon-512.png</button>
    </div>
  </div>
  <script>
    function drawIcon(canvas) {
      const s = canvas.width;
      const ctx = canvas.getContext('2d');
      const r = s * 0.22;
      // Bakgrund
      ctx.beginPath();
      ctx.moveTo(r, 0);
      ctx.lineTo(s - r, 0);
      ctx.quadraticCurveTo(s, 0, s, r);
      ctx.lineTo(s, s - r);
      ctx.quadraticCurveTo(s, s, s - r, s);
      ctx.lineTo(r, s);
      ctx.quadraticCurveTo(0, s, 0, s - r);
      ctx.lineTo(0, r);
      ctx.quadraticCurveTo(0, 0, r, 0);
      ctx.closePath();
      ctx.fillStyle = '#4f46e5';
      ctx.fill();
      // Kalenderram
      const lw = s * 0.047;
      ctx.strokeStyle = 'white';
      ctx.lineWidth = lw;
      ctx.lineJoin = 'round';
      const cx = s * 0.218, cy = s * 0.297, cw = s * 0.563, ch = s * 0.484;
      ctx.beginPath();
      ctx.roundRect(cx, cy, cw, ch, lw);
      ctx.stroke();
      // Krokar
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(s * 0.344, s * 0.234); ctx.lineTo(s * 0.344, s * 0.359);
      ctx.moveTo(s * 0.656, s * 0.234); ctx.lineTo(s * 0.656, s * 0.359);
      ctx.stroke();
      // Separator
      ctx.globalAlpha = 0.5;
      ctx.lineWidth = lw * 0.67;
      ctx.beginPath();
      ctx.moveTo(cx, s * 0.437); ctx.lineTo(cx + cw, s * 0.437);
      ctx.stroke();
      ctx.globalAlpha = 1;
      // Prickar
      const dotR = s * 0.027;
      const dots = [
        [0.357, 0.531],[0.5, 0.531],[0.643, 0.531],
        [0.357, 0.648],[0.5, 0.648]
      ];
      ctx.fillStyle = 'white';
      dots.forEach(([dx, dy]) => {
        ctx.beginPath();
        ctx.arc(s * dx, s * dy, dotR, 0, Math.PI * 2);
        ctx.fill();
      });
      // Sista prick (tonad)
      ctx.fillStyle = '#a5b4fc';
      ctx.globalAlpha = 0.8;
      ctx.beginPath();
      ctx.arc(s * 0.643, s * 0.648, dotR, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
    drawIcon(document.getElementById('c192'));
    drawIcon(document.getElementById('c512'));
    function download(id, name) {
      const a = document.createElement('a');
      a.download = name;
      a.href = document.getElementById(id).toDataURL('image/png');
      a.click();
    }
  </script>
</body>
</html>
